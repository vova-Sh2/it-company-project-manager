{% extends "base.html" %}

{% block content %}
  <h1 class="major">Workers <a class="button" href="{% url 'task_manager:worker-create' %}">➕add worker</a></h1>
  <form method="get" action="" class="d-flex">
    {{ search_username }}
  <input type="submit" value="🔍">
  </form>
  <ul class="alt">
    {% for worker in worker_list%}
      <li class="border m-4">
        <div>
          <div class="text-center p-3">
            <h2 class="major m-auto">Name: {{ worker.username }}</h2>
            <h2 class="major m-auto">Position: {{ worker.position }}</h2>
          </div>
          <div class="d-flex justify-content-center gap-4">
            <a class="button" href="{% url 'task_manager:worker-position-update' pk=worker.id %}">Update</a>
            <a class="button bg-danger">Delete</a>
          </div>
        </div>

      </li>
    {% endfor %}
  </ul>
{% endblock %}
