{% extends "base.html" %}

{% block content %}
  <h1>Delete Task?</h1>
  <form action="" method="post">
    {% csrf_token %}

    <div class="d-flex">
      <input class="bg-danger me-4" type="submit" value="Delete">
      <a class="button" href="{% url 'task_manager:task-detail' pk=task.id %}">Cancel</a>
    </div>
  </form>
{% endblock %}
