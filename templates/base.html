<!DOCTYPE HTML>
{% load static %}
<html>
	<head>
		<title>IT Task Manager</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
		<link rel="stylesheet" href="{% static 'vendor/css/main.css' %}" />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
		<noscript><link rel="stylesheet" href="{% static 'vendor/css/noscript.css' %}" /></noscript>
	</head>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<body class="is-preload">

    <div class="navigate">
      {% block sidebar %}
        {% include "includes/sidebar.html" %}
      {% endblock %}
    </div>
			<div id="wrapper">

            <div class="fade-in text-center">
              {% block content %}
              {% endblock %}
              {% block pagination %}
                  {% include "includes/pagination.html" %}
              {% endblock %}

            </div>
			</div>

		<!-- BG -->
			<div id="bg"></div>

		<!-- Scripts -->
			<script src="{% static 'vendor/js/jquery.min.js' %}"></script>
			<script src="{% static 'vendor/js/browser.min.js' %}"></script>
			<script src="{% static 'vendor/js/breakpoints.min.js' %}"></script>
			<script src="{% static 'vendor/js/util.js' %}"></script>
			<script src="{% static 'vendor/js/main.js' %}"></script>

	</body>
</html>
